services:
  backend:
    networks:
      web:
        aliases:
          - backend
          - enmipueblo_backend
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      ADMIN_EMAILS: ${ADMIN_EMAILS}

  frontend:
    networks:
      web:
        aliases:
          - frontend
          - enmipueblo_frontend
    environment:
      PUBLIC_GOOGLE_CLIENT_ID: ${PUBLIC_GOOGLE_CLIENT_ID}

networks:
  web:
    external: true